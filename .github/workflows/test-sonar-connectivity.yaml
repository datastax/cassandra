# Test Network Connectivity to IBM SonarQube
# Location: Save as ~/projects/cc-main/.github/workflows/test-sonar-connectivity.yaml
# 
# Purpose: Verify GitHub-hosted runners can reach IBM SonarQube server
# Run this BEFORE implementing the full sonar workflow

name: Test SonarQube Connectivity

on:
  workflow_dispatch:

jobs:
  test-from-github-hosted:
    runs-on: ubuntu-latest  # GitHub-hosted runner
    name: Test from GitHub-Hosted Runner
    
    steps:
      - name: Environment Info
        run: |
          echo "=== Testing from GitHub-Hosted Runner ==="
          echo "Runner: ubuntu-latest"
          echo "IP Address:"
          curl -s ifconfig.me || echo "Could not determine IP"
          echo ""
          echo "========================================="
      
      - name: Test 1 - DNS Resolution
        run: |
          echo "=== Test 1: DNS Resolution ==="
          echo "Testing: sonarqube-prod.whitewater.ibm.com"
          nslookup sonarqube-prod.whitewater.ibm.com || echo "DNS lookup failed"
          echo ""
          
          echo "Testing: sonarqube-prod.apps.wdc-sonarqube-prod.core.cirrus.ibm.com"
          nslookup sonarqube-prod.apps.wdc-sonarqube-prod.core.cirrus.ibm.com || echo "DNS lookup failed"
          echo ""
      
      - name: Test 2 - HTTPS Connectivity (No Auth)
        run: |
          echo "=== Test 2: HTTPS Connectivity (No Certificate) ==="
          echo "Testing basic HTTPS connection..."
          
          echo "--- whitewater.ibm.com ---"
          curl -v -I --max-time 30 \
            https://sonarqube-prod.whitewater.ibm.com/api/system/status 2>&1 || echo "Connection failed"
          echo ""
          
          echo "--- cirrus.ibm.com ---"
          curl -v -I --max-time 30 \
            https://sonarqube-prod.apps.wdc-sonarqube-prod.core.cirrus.ibm.com/api/system/status 2>&1 || echo "Connection failed"
          echo ""
      
      - name: Test 3 - With Certificate (If Secret Exists)
        if: ${{ secrets.IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64 != '' }}
        env:
          IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64: ${{ secrets.IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64 }}
          IBM_SONARQUBE_CERT_PASSWORD: ${{ secrets.IBM_SONARQUBE_CERT_PASSWORD }}
        run: |
          echo "=== Test 3: With IBM Certificate ==="
          
          if [ -z "$IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64" ]; then
            echo "⚠️  IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64 secret not set"
            exit 0
          fi
          
          echo "Decoding truststore certificate..."
          echo "$IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64" | base64 --decode > ./castorevpcprod
          ls -lh ./castorevpcprod
          
          echo ""
          echo "Testing with certificate (whitewater.ibm.com)..."
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            --cacert ./castorevpcprod \
            https://sonarqube-prod.whitewater.ibm.com/api/system/status || echo "000")
          
          echo "HTTP Response Code: $response"
          
          if [[ "$response" == "200" ]]; then
            echo "✅ SUCCESS! Server is reachable and responded with 200 OK"
            echo "GitHub-hosted runners CAN access IBM SonarQube!"
          elif [[ "$response" == "401" ]]; then
            echo "✅ Server is reachable (got 401 Unauthorized)"
            echo "This is OK - means we need authentication token, but network access works"
          elif [[ "$response" == "000" ]]; then
            echo "❌ FAILED! Could not connect to server"
            echo "This likely means network/firewall blocking"
          else
            echo "⚠️  Got unexpected response: $response"
          fi
          
          echo ""
          echo "Full response with details:"
          curl -v --cacert ./castorevpcprod \
            https://sonarqube-prod.whitewater.ibm.com/api/system/status 2>&1 || true
      
      - name: Test 4 - With Auth Token (If Secret Exists)
        if: ${{ secrets.IBM_SONARQUBE_API_TOKEN != '' }}
        env:
          IBM_SONARQUBE_API_TOKEN: ${{ secrets.IBM_SONARQUBE_API_TOKEN }}
          IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64: ${{ secrets.IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64 }}
        run: |
          echo "=== Test 4: With Auth Token ==="
          
          if [ -z "$IBM_SONARQUBE_API_TOKEN" ]; then
            echo "⚠️  IBM_SONARQUBE_API_TOKEN secret not set"
            exit 0
          fi
          
          echo "$IBM_SONARQUBE_CERT_TRUSTSTORE_BASE64" | base64 --decode > ./castorevpcprod
          
          echo "Testing authenticated request..."
          curl -v --cacert ./castorevpcprod \
            -H "Authorization: Bearer $IBM_SONARQUBE_API_TOKEN" \
            https://sonarqube-prod.whitewater.ibm.com/api/system/status 2>&1 || true
      
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "=== CONNECTIVITY TEST SUMMARY ==="
          echo "========================================="
          echo ""
          echo "Review the test results above to determine:"
          echo "1. Can GitHub-hosted runners resolve DNS?"
          echo "2. Can they reach the HTTPS endpoint?"
          echo "3. Does the certificate work?"
          echo "4. Does authentication work?"
          echo ""
          echo "If all tests pass → Use GitHub-hosted runners (ubuntu-latest)"
          echo "If connection fails → Need self-hosted runners on DataStax network"
          echo ""
          echo "========================================="
